# ==================================================
# 基本設定
# ==================================================
# 256 色 + true color 対応（Ghostty / iTerm2 で正しい色を出すため）
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"

# window / pane のインデックスを 1 始まりに（0 は遠いので 1 から）
set -g base-index 1
setw -g pane-base-index 1

# window を閉じたらインデックスを詰めて振り直す
set -g renumber-windows on

# scrollback バッファを増やす（デフォルト 2000 行 → 100000 行）
set -g history-limit 100000

# Esc キーの遅延を短く（nvim での Esc 反応のため）
set -sg escape-time 10

# マウス操作を有効化（pane 切替・リサイズ・スクロール）
set -g mouse on

# ==================================================
# キーバインド
# ==================================================
# prefix は Ctrl-b（デフォルト維持）

# 設定リロード（prefix r）
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# pane 分割を直感的に（| 縦分割、- 横分割。現在の pane の cwd を引き継ぐ）
# JIS キーボード対策で ¥ も縦分割に割り当て（Shift+¥ で | を打たなくても良い）
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind '¥' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# pane フォーカス移動（vim 風 hjkl、prefix 必要）
# 注: prefix l はデフォルトでは last-window だが select-pane -R に上書きする。
#     last-window は prefix Tab に逃がす（下記）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 直前のタブ（window）へ戻る（デフォルト prefix l の代替）
bind Tab last-window

# pane リサイズ（prefix + Shift+HJKL を連打可能に）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt+hjkl で prefix なしフォーカス移動（zellij で便利だった機能）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ==================================================
# ステータスバー（VS Code Dark / Tokyo Night 系の配色）
# ==================================================
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# 背景・前景
set -g status-style "bg=#1e1e1e,fg=#d4d4d4"

# 左: セッション名
set -g status-left-length 30
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#d4d4d4]| "

# 右: 時計
set -g status-right-length 60
set -g status-right "#[fg=#9ece6a]%Y-%m-%d #[fg=#e0af68]%H:%M "

# window のスタイル（非アクティブ）
setw -g window-status-format "#[fg=#d4d4d4] #I:#W "

# window のスタイル（アクティブ）
setw -g window-status-current-format "#[fg=#1e1e1e,bg=#7aa2f7,bold] #I:#W "

# pane の枠線色
set -g pane-border-style "fg=#3b3b3b"
set -g pane-active-border-style "fg=#7aa2f7"

# ==================================================
# プラグイン（TPM 経由）
# ==================================================
# プラグインマネージャ本体
set -g @plugin 'tmux-plugins/tpm'

# まともなデフォルト設定セット
set -g @plugin 'tmux-plugins/tmux-sensible'

# session 保存・復元（手動: prefix Ctrl-s / prefix Ctrl-r）
set -g @plugin 'tmux-plugins/tmux-resurrect'

# session の自動保存（15 分ごと）+ tmux 起動時の自動復元
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: pane 内で動いてたプロセス（nvim 等）も復元する
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# continuum: 自動復元を有効化
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM 初期化（このブロックは必ず tmux.conf の末尾に置くこと）
# XDG 準拠の場所（~/.config/tmux/plugins/）を明示。tmux.conf を XDG 配下に置いた場合に
# TPM が自動で TMUX_PLUGIN_MANAGER_PATH=~/.config/tmux/plugins/ を見るためここも合わせる
run '~/.config/tmux/plugins/tpm/tpm'
