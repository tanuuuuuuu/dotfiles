onboarding = false
# herdr 設定
# 全デフォルトは `herdr --default-config` で確認できる。
# ここには変更したい項目だけを書く（未記載はデフォルト値）。

[keys]
# プレフィックス（herdr への命令の合図キー）。デフォルトは ctrl+b。
# ctrl+a は ことえり（変換中の行頭移動）と Ghostty の Cmd+←（\x01 送信）に衝突するため回避。
prefix = "ctrl+q"

# agent pane 間を prefix なしで直接ジャンプ（ctrl+alt は pane 内アプリと衝突しにくい）
next_agent = "ctrl+alt+j"
previous_agent = "ctrl+alt+k"

# workspace の直接切替（agent ジャンプ + shift）
next_workspace = "ctrl+shift+alt+j"
previous_workspace = "ctrl+shift+alt+k"

# ポップアップターミナル（タイル配置を崩さず一時シェルを重ねる）
# 中で hunk 等の TUI も使える。exit / ctrl+d で閉じる
# Cmd+` は Ghostty 側で CSI-u（super+`）に変換して送信している（ghostty/config 参照）
[[keys.command]]
key = "cmd+backtick"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "popup terminal"
width = "85%"
height = "85%"

[experimental]
# prefix モード中だけ入力ソースを ASCII レイアウトに一時切替し、
# prefix を抜けたら元の入力ソースに自動復帰する（CJK IME 対策）。macOS 限定。
switch_ascii_input_source_in_prefix = true
