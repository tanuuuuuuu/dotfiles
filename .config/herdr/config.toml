onboarding = false
# herdr 設定
# 全デフォルトは `herdr --default-config` で確認できる。
# ここには変更したい項目だけを書く（未記載はデフォルト値）。

[keys]
# プレフィックス（herdr への命令の合図キー）。デフォルトは ctrl+b。
# ctrl+a は ことえり（変換中の行頭移動）と Ghostty の Cmd+←（\x01 送信）に衝突するため回避。
prefix = "ctrl+q"

# agent pane 間を prefix なしで直接ジャンプ。pane 内の ctrl+j（改行）/
# ctrl+k（kill-line）は herdr が横取りする（改行は shift+enter で代替可能）
next_agent = "ctrl+j"
previous_agent = "ctrl+k"

# workspace の直接切替（agent ジャンプ + shift でスコープ拡大）
next_workspace = "ctrl+shift+j"
previous_workspace = "ctrl+shift+k"

# 新規タブ。pane 内の ctrl+n（次の履歴/下移動）は herdr が横取りする
new_tab = "ctrl+n"

# タブ切替（ctrl+数字はレガシー端末では表現不可だが、
# herdr は kitty キーボードプロトコルを有効化しているため受信できる）
switch_tab = "ctrl+1..9"

# ポップアップターミナル（タイル配置を崩さず一時シェルを重ねる）
# 中で hunk 等の TUI も使える。exit / ctrl+d で閉じる
[[keys.command]]
key = "ctrl+backtick"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "popup terminal"
width = "90%"
height = "90%"

# サイドバー agent エントリの表示行（0.7.4+）
# 1行目: リポジトリ（workspace）+ エージェント名
# 2行目: 実行中のツール操作（.claude/hooks/herdr-activity.sh が報告、アイドル時は idle）
# 3行目: コンテキスト使用率 + compact 回数（statusline.sh が報告、compact は 1 回以上で表示）
[ui.sidebar.agents]
rows = [["state_icon", "workspace", "agent"], ["$activity"], ["$ctx", "$compacts"]]

[experimental]
# prefix モード中だけ入力ソースを ASCII レイアウトに一時切替し、
# prefix を抜けたら元の入力ソースに自動復帰する（CJK IME 対策）。macOS 限定。
switch_ascii_input_source_in_prefix = true
